services:
  auth-service:
    image: auth-service:latest
    container_name: auth-service-container
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
    # depends_on:
    #   - loki
    ports:
      - '8000:8000'
    env_file:
      - .env.dev
    restart: unless-stopped
    volumes:
      - ./src:/usr/src/backend-app/src
      - ./package.json:/usr/src/backend-app/package.json
      - ./package-lock.json:/usr/src/backend-app/package-lock.json

  loki:
    image: grafana/loki:2.8.2
    container_name: loki
    ports:
      - '3100:3100'
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - ./src/config/loki-config.yaml:/etc/loki/config.yaml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.8.2
    container_name: promtail
    volumes:
      - /var/log:/var/log # Mount host logs
      - ./src/config/promtail-config.yaml:/etc/promtail/config.yaml
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./src/config/prometheus.yaml:/etc/prometheus/prometheus.yaml
    ports:
      - '9090:9090'
    command:
      - '--config.file=/etc/prometheus/prometheus.yaml'
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - '3000:3000'
    volumes:
      - grafana_data:/var/lib/grafana

  # dragonfly:
  #   image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.27.1
  #   container_name: dragonfly
  #   network_mode: 'host'
  #   ulimits:
  #     memlock:
  #       soft: -1
  #       hard: -1
  #   volumes:
  #     - dragonfly_data:/data
  #   restart: unless-stopped

networks:
  auth-network:
    driver: bridge

volumes:
  dragonfly_data:
    driver: local
  grafana_data:
    driver: local
